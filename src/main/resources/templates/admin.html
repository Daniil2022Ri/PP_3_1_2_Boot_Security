<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <title>Spring Security Example</title>
    <link th:href ="@{css/style.css}" rel="stylesheet">
    <link rel="stylesheet" href="/src/main/resources/static/css/animation.css">
    <link rel="stylesheet" href="/src/main/resources/static/css/style.css">
</head>
<body>

    <select name="" id="Language_Settings">
        <option value="ru">Russian <img src="" alt=""></option>
        <option value="en">English <img src="" alt=""></option>
        <option value="gr">German <img src="" alt=""></option>
    </select>


<div class = "header_welcome">
    <h1 class = "welcome">Welcome to Admine Panel!</h1>
</div>

<main>
    <div class = "header">
        <div id ="header_projects_all_buttons" class = "header_project">
            <nav class = "navigation">
                <ul class ="navigation_project">
                    <li class = "monitoring_project"><button id ="btn_monitoring" class ="open_monitoring_project">Open All Project</button></li>
                    <li class = "all_workers"><button id = "btn_all_workers" class = "workers_all">All Worker</button></li>
                    <li class = "monitoring_worker_working_hours"><button class = "worker_hours">Worker Hours</button></li>
                    <li class = "monitoring_money_working_and_teamLeed"><button class ="worker_money">money Worker</button></li>
                    <li class = "monitorung_report_working_databace"><button class ="reports">Reports</button></li>
                </ul>
            </nav>
        </div>

        <div id = "action_workers_base" class="all_workers_base">
            <button id = "btn_add_new_worker">Add Worker</button>
            <table>
                <tr>
                    <th>ID</th>
                    <th>FIRST NAME</th>
                    <th>LAST NAME</th>
                    <th>AGE</th>
                    <th>EMAIL</th>
                    <th>PHONE NUMBER</th>
                    <th>SALARY CARD</th>
                </tr>
                <tr th:each = "user : ${allUsers}">
                    <td th:text ="${user.id}"></td>
                    <td th:text ="${user.firstName}"></td>
                    <td th:text ="${user.lastName}"></td>
                    <td th:text ="${user.age}"></td>
                    <td th:text ="${user.email}"></td>
                    <td th:text ="${user.phoneNumber}"></td>
                    <td th:text ="${user.salaryCard}"></td>
                    <td>
                        <button id = "btn_edit_worker_table">Edit Worker</button>
                        <button id = "btn_delete_worker_table">Delete Worker</button>
                    </td>
                </tr>
            </table>
        </div>

        <div id = "form_add_worker_admin" class = "admin_addUsers">
            <div class = "name_form_worker">
                <h2>New Worker Form</h2>
            </div>
            <div class="worker_form">
                <form onsubmit="return false">
                    <br>First Name Worker<br>
                    <input type="text" Name = "firstName" maxlength="60" size = "40">
                    <br>Last Name Worker<br>
                    <input type="text" Name = "lastName" maxlength="60" size = "40">
                    <br>Email<br>
                    <input type="text" Name = "email" maxlength="60" size = "40">
                    <br>Phone number<br>
                    <input type="text" Name = "phone number" maxlength="60" size = "40">
                    <br>date age<br>
                    <input type="text" Name = "date age" maxlength="60" size = "40">
                    <br>Salary card<br>
                    <input type="text" Name = "card" maxlength="60" size = "40">
            </div>
            <div class = "btn_accept_formNewUser">
                <button id = "btn_accepting_new_worker_form">accept</button>
                <button id = "btn_close_form_worker">close</button>
            </div>
        </div>

        <div id ="all_projects" class="header_all_project">
            <div class = "all__Project">
                <h2 class = "text_allProject">All Project</h2>
            </div>

            <ul class = "tableAll_project">
                <li class = "project"><button>Amazon</button>
                    <button class = "delete_project_img">delete<img src="" alt=""></button>
                    <button class = "edite_project_img">edit<img src="" alt=""></button>
                </li>
                <li class = "project"><button>Sberbank</button>
                    <button class = "delete_project_img">delete<img src="" alt=""></button>
                    <button class = "edite_project_img">edit<img src="" alt=""></button>
                </li>
                <li class = "project"><button>Wildberes</button>
                    <button class = "delete_project_img">delete<img src="" alt=""></button>
                    <button class = "edite_project_img">edit<img src="" alt=""></button>
                </li>
            </ul>
                <div class = "button_close_allProject">
                    <button id = "btn_close_TableAll" class = "close_all_project">Close</button>
                </div>

        </div>

        <div id ="Panel_delete_project" class ="warning_DeleteProject">
            <h2>Do you want delete Project</h2>
            <button id="deleteBTN_project">Yes</button>
            <button ide="deletBTN_not_project">No</button>
        </div>

        <div class = "worker_from_poject">
            <h2>Your worker</h2>
            <div class="worker_statistic">
                <div class = "team_lead_workers">
                    <button><img src="" alt=""> <p>Dmytriy Medovuhin</p><h2>Team Leed</h2></button>
                </div>
                <ul class = "workers">
                    <li th:text = "user : ${userWorker}">
                        <button>
                            <img src="" alt=""> 
                            <p th:text = "${user.firstName}"></p>
                            <p th:text ="${user.lastName}"></p> 
                            <p th:text = "${user.work}"></p> 
                            <p th:text = "${user.level}"></p>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
        </div>
    </div>
</main>
<script src ="/src/main/resources/static/js/script.js"></script>
<script src ="/src/main/resources/static/js/language.js"></script>
<script th:src="@{/js/script.js}"></script>
<script th:scr="@{/js/language.js}"></script>
</body>
</html>
